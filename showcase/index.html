<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TanVite showcase site for the public landing page and guide."
    />
    <title>TanVite Showcase</title>
    <script>
      (() => {
        const storageKey = "tanvite-site-theme";
        const query = "(prefers-color-scheme: dark)";
        const root = document.documentElement;

        try {
          const stored = window.localStorage.getItem(storageKey);
          const preference =
            stored === "dark" || stored === "light" || stored === "system" ? stored : "system";
          const resolved =
            preference === "system" && window.matchMedia(query).matches ? "dark" : preference;
          const effectiveTheme = resolved === "dark" ? "dark" : "light";

          root.classList.toggle("dark", effectiveTheme === "dark");
          root.style.colorScheme = effectiveTheme;
          root.dataset.themePreference = preference;
          root.dataset.themeResolved = effectiveTheme;
        } catch {
          root.classList.remove("dark");
          root.style.colorScheme = "light";
          root.dataset.themePreference = "system";
          root.dataset.themeResolved = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
